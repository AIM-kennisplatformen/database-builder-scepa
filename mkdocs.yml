site_name: Database-builder-scepa
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
  - content.tabs.link
  - navigation.tabs
  - content.tabs.link
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - navigation.path
  - navigation.top
  - search.suggest
  - search.highlight
  - content.code.copy
  - content.code.annotate
markdown_extensions:
- pymdownx.emoji
- pymdownx.highlight
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.keys
- pymdownx.mark
- pymdownx.tilde
- pymdownx.betterem
- def_list
- pymdownx.tasklist:
    custom_checkbox: true
- toc:
    permalink: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: !!python/name:pymdownx.superfences.fence_code_format ""
- pymdownx.tabbed:
    alternate_style: true
- attr_list
- md_in_html
- admonition
- pymdownx.details

plugins:
- mkdocstrings:
    handlers:
      python:
        paths: [ src ]
        inventories:
        - https://docs.python.org/3/objects.inv

        options:
          docstring_options:
            ignore_init_summary: true

          docstring_section_style: list

          relative_crossrefs: true
          scoped_crossrefs: true
          signature_crossrefs: true
          unwrap_annotated: true

          filters: public
          inherited_members: true
          summary: true

          heading_level: 1

          parameter_headings: true

          type_parameter_headings: true

          show_root_heading: true

          show_root_full_path: false

          show_symbol_type_heading: true

          show_symbol_type_toc: true

          line_length: 88

          merge_init_into_class: true

          separate_signature: true

          show_signature_annotations: true

          show_signature_type_parameters: true

          backlinks: tree
          show_bases: false
          show_inheritance_diagram: true
nav:
- index.md
- Getting Started:
  - getting_started/00_getting_started.md
  - getting_started/01_learn_the_basics.md
  - getting_started/02_examples.md
- Main Modules:
  - main_modules/00_overview.md
  - main_modules/01_connectors.md
  - main_modules/02_storage.md
  - main_modules/03_sync.md
- Introduction:
    - introduction/00_introduction.md
    - introduction/01_faq.md
    - introduction/02_repository.md

- Contributing:
  - contributing/rules.md
